name: CI

on:
  push:
    branches: [ main, "release/**" ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  nix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check flake
        run: nix flake check -L

      - name: Rust formatting
        run: nix develop --command cargo fmt --check

      - name: Rust tests
        run: nix develop --command cargo test --all-targets

      - name: Clippy
        run: nix develop --command cargo clippy --all-targets

  native-linux:
    name: Native Ubuntu build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends             pkg-config             libwayland-dev             wayland-protocols             libxkbcommon-dev             libxkbcommon-x11-dev             libx11-dev             libxcursor-dev             libxi-dev             libxrandr-dev             libgl1-mesa-dev             libegl1-mesa-dev             libvulkan-dev             libudev-dev

      - name: Select stable Rust
        run: |
          rustup update stable
          rustup default stable
          rustup component add rustfmt clippy

      - name: Rust formatting
        run: cargo fmt --check

      - name: Native Rust tests
        run: cargo test --all-targets --locked

      - name: Native Clippy
        run: cargo clippy --all-targets --locked

      - name: Native release build
        run: cargo build --release --locked
