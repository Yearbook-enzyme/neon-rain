name: Bug report
description: Report a reproducible problem with Neon Rain
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve Neon Rain. Please remove private paths, media, and account information from logs.
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Describe the observed behavior and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Launch with ...
        2. Enable ...
        3. Observe ...
    validations:
      required: true
  - type: input
    id: revision
    attributes:
      label: Commit or version
      placeholder: git rev-parse --short HEAD
    validations:
      required: true
  - type: input
    id: system
    attributes:
      label: OS and desktop/session
      placeholder: NixOS, KDE Plasma, Wayland
    validations:
      required: true
  - type: input
    id: gpu
    attributes:
      label: GPU and graphics backend
      placeholder: AMD Radeon RX 580, Vulkan
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      render: shell
  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I searched for an existing report.
          required: true
        - label: I removed private information from the report.
          required: true
