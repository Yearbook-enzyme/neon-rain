# Neon Rain example configuration
#
# Copy this file to:
#   ~/.config/neon-rain/config.conf
#
# View the effective settings with:
#   neon-rain --print-config

theme = classic
palette = theme
fullscreen = true
window_width = 1280
window_height = 720
auto_flight = forward
cinematic = true
media_enabled = true
media_path =
remember = true
