# Neon Rain example configuration
#
# Copy this file to:
#   ~/.config/neon-rain/config.conf
#
# A scene coordinates theme, palette, flight, FOV, and cinematic behavior.
# Values below the scene may override its choices.
#
# Runtime:
#   F12     cycle scenes
#   Home    reload this file
#   End     save the current session
#   Insert  toggle status toasts

scene = classic-matrix
theme = classic
palette = theme
fullscreen = true
window_width = 1280
window_height = 720
field_of_view = 60
auto_flight = forward
cinematic = true
media_enabled = true
media_path =
remember = true
