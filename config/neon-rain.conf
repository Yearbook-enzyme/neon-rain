# Neon Rain example configuration
#
# Copy this file to:
#   ~/.config/neon-rain/config.conf
#
# Select one complete scene. The optional visual overrides are commented so
# changing this line alone works as expected.
#
# Runtime:
#   F12     cycle scenes
#   Home    reload this file
#   End     save the current session
#   Insert  toggle status toasts

scene = classic-matrix

# Optional scene overrides:
# theme = classic
# palette = theme
# field_of_view = 60
# auto_flight = forward
# cinematic = true

fullscreen = true
window_width = 1280
window_height = 720
media_enabled = true
media_path =
remember = true
